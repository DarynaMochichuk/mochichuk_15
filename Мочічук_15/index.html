<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CakeShop</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Lobster&display=swap" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<header>

    <div class="logo">CakeShop</div>

    <input type="checkbox" id="menu-toggle">

    <label for="menu-toggle" class="hamburger">
        ☰
    </label>

    <nav>
        <ul class="menu">
            <li><a href="#">Cakes</a></li>
            <li><a href="#">Desserts</a></li>
            <li><a href="#">Promotions</a></li>
            <li><a href="#">Contacts</a></li>
        </ul>
    </nav>

</header>

<main>

    <section class="offers">

        <h2>Sweet offers </h2>

        <div class="cards">

            <article class="card">

                <div class="sale">Sale!</div>

                <img src="https://images.unsplash.com/photo-1578985545062-69928b1d9587?w=500"
                     alt="Chocolate Cake">

                <h3>Chocolate Cake</h3>

                <p class="old-price">Original 299</p>

                <p class="new-price">$129.99</p>

                <button>Order</button>

            </article>

            <article class="card">

                <div class="sale">Sale!</div>

                <img src="https://images.unsplash.com/photo-1565958011703-44f9829ba187?w=500"
                     alt="Strawberry Cake">

                <h3>Strawberry Cake</h3>

                <p class="old-price">Original 259</p>

                <p class="new-price">$129.99</p>

                <button>Order</button>

            </article>

            <article class="card">

                <div class="sale">Sale!</div>

                <img src="https://images.unsplash.com/photo-1551024601-bec78aea704b?w=500"
                     alt="Blueberry Cake">

                <h3>Blueberry Cake</h3>

                <p class="old-price">Original 599</p>

                <p class="new-price">$149.99</p>

                <button>Order</button>

            </article>

        </div>

    </section>

</main>

<footer>

    <div class="footer-info">
        <p>Working 10pm</p>
        <p>Topex - 10pm</p>
        <p>Mochichuk D. O. PI-23-02</p>
    </div>

    <div class="socials">
        <a href="#"><i class="fab fa-facebook-f"></i></a>
        <a href="#"><i class="fab fa-twitter"></i></a>
        <a href="#"><i class="fab fa-instagram"></i></a>
        <a href="#"><i class="fab fa-youtube"></i></a>
    </div>

</footer>

</body>
</html>
